name: Fetch Deputy Shifts

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  fetch-shifts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch today's shifts from Deputy
        env:
          DEPUTY_TOKEN: ${{ secrets.DEPUTY_TOKEN }}
        run: python .github/scripts/fetch_shifts.py

      - name: Commit and push shifts-today.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shifts-today.json
          git commit -m "chore: update shifts-today.json" --allow-empty
          git push
